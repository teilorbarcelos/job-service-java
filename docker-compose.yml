version: '3.8'

services:
  app:
    build:
      context: .
    container_name: backend_java_quarkus_app
    ports:
      - "8888:8888"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/backend_db
      - QUARKUS_DATASOURCE_USERNAME=postgres
      - QUARKUS_DATASOURCE_PASSWORD=postgrespw
      - QUARKUS_DATASOURCE_DEVSERVICES_ENABLED=false
      - QUARKUS_REDIS_HOSTS=redis://redis:6379
      - QUARKUS_REDIS_DEVSERVICES_ENABLED=false
      - JWT_SECRET=${JWT_SECRET:-86941813-8b97-4cad-b0b2-f97734a947d7}
      - FIRST_USER=${FIRST_USER:-admin@email.com}
      - FIRST_PASSWORD=${FIRST_PASSWORD:-admin@123}
    depends_on:
      - db
      - redis
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: backend_java_quarkus_db
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespw
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: backend_java_quarkus_redis
    ports:
      - "6379:6379"
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: backend_java_quarkus_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge
