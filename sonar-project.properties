sonar.projectKey=job-service-java
sonar.projectName=Job Service Java
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.coveragePlugin=jacoco
sonar.jacoco.reportPaths=target/site/jacoco/jacoco.xml
sonar.exclusions=**/Application.java,**/target/**,**/generated/**
sonar.host.url=http://localhost:9000
# sonar.login is set via CI environment variable SONAR_TOKEN

# Ignore hardcoded dev defaults in env config
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e1.resourceKey=**/AppSettings.java
sonar.issue.ignore.multicriteria.e2.ruleKey=secrets:S6736
sonar.issue.ignore.multicriteria.e2.resourceKey=**/AppSettings.java
