# =============================================================================
# Backend Java Quarkus — Application Configuration
# =============================================================================

# --- Application ---
quarkus.application.name=backend-java-quarkus
quarkus.http.port=8888
quarkus.http.host=0.0.0.0
quarkus.http.enable-compression=true
quarkus.http.compression-level=6

quarkus.virtual-threads.enabled=true

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=false
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/backend_db
quarkus.datasource.username=postgres
quarkus.datasource.password=postgrespw

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

quarkus.hibernate-orm.jdbc.statement-batch-size=25

quarkus.datasource.jdbc.min-size=10
quarkus.datasource.jdbc.max-size=50
quarkus.datasource.jdbc.acquisition-timeout=5S
quarkus.datasource.jdbc.leak-detection-interval=5S
quarkus.datasource.jdbc.validation-query-sql=SELECT 1

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# --- Redis ---
quarkus.redis.devservices.enabled=false

# --- RabbitMQ ---
quarkus.rabbitmq.devservices.enabled=false
quarkus.redis.hosts=${REDIS_HOSTS:redis://localhost:6379}

# JWT
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey.algorithm=HS256
smallrye.jwt.new-token.signature-algorithm=HS256
# Custom properties for our JwtService
app.url=${APP_URL:http://localhost:8888}
app.jwt.secret=${JWT_SECRET:secret}
app.jwt.expiration=${JWT_EXPIRATION:3600}
app.jwt.issuer=${app.url}

# Allow our custom filters to handle security
quarkus.http.auth.permission.default.policy=permit

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Requested-With
quarkus.http.cors.access-control-allow-credentials=true

# --- OpenAPI / Swagger ---
quarkus.smallrye-openapi.path=/v1/swagger.json
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/v1/docs
quarkus.smallrye-openapi.info-title=Backend Java Quarkus API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=API RESTful com autenticação JWT, ACL e CRUD genérico

# --- Mailer ---
quarkus.mailer.from=${SMTP_FROM:no-reply@example.com}
quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.start-tls=DISABLED
quarkus.mailer.mock=${MAILER_MOCK:true}

# --- Metrics (Prometheus) ---
quarkus.micrometer.export.prometheus.path=/metrics
quarkus.http.non-application-root-path=/

# --- Logging (JSON structured) ---
quarkus.log.console.json=true
quarkus.log.level=INFO
quarkus.hibernate-orm.log.sql=false

# --- Rate Limit ---
app.rate-limit.max=${RATE_LIMIT_MAX:60}
app.rate-limit.window=${RATE_LIMIT_WINDOW:60}

# --- Seed ---
app.seed.first-user=${FIRST_USER:admin@email.com}
app.seed.first-password=${FIRST_PASSWORD:admin@123}

# --- App ---
app.version=${APP_VERSION:1.0.0}
app.debug=${APP_DEBUG:true}
app.auth.mode=${AUTH_MODE:local}

# --- Messaging (SmallRye Reactive Messaging) ---
app.messaging.enabled=${MESSAGING_ENABLED:false}
mp.messaging.connector.smallrye-rabbitmq.host=${RABBIT_HOST:localhost}
mp.messaging.connector.smallrye-rabbitmq.port=${RABBIT_PORT:5672}
mp.messaging.connector.smallrye-rabbitmq.username=${RABBIT_USER:guest}
mp.messaging.connector.smallrye-rabbitmq.password=${RABBIT_PASSWORD:guest}
mp.messaging.outgoing.messages-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.messages-out.queue.name=messages
mp.messaging.outgoing.messages-out.durable=true

# --- Storage ---
storage.disk=${STORAGE_DISK:local}
storage.local.path=${STORAGE_PATH:storage/app}
storage.url=${STORAGE_URL:${app.url}/storage}

# --- PDF Service ---
quarkus.rest-client.pdf-service.url=${PDF_SERVICE_URL:http://localhost:8889}
quarkus.rest-client.pdf-service.connect-timeout=5000
quarkus.rest-client.pdf-service.read-timeout=30000

# --- Hibernate Metrics ---
quarkus.hibernate-orm.metrics.enabled=true
