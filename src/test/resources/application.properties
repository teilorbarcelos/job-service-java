# Banco H2 em Memória
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.driver=org.h2.Driver
quarkus.datasource.jdbc.url=jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=RUNSCRIPT FROM 'classpath:init_test.sql'

# Forçar uma porta diferente para evitar conflito com o make dev
quarkus.http.test-port=9999

# Desativar Flyway nos testes
quarkus.flyway.migrate-at-start=false

# Hibernate cria o banco na memória e gera os schemas automaticamente
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.database.generation.create-schemas=true

# Redis para testes (Usando o do localhost para evitar dependência de Docker no ambiente de teste)
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379

# JWT Issuer para testes
app.url=http://localhost:8888
app.jwt.issuer=${app.url}
app.jwt.secret=a-very-long-secret-for-testing-purposes-at-least-32-chars
app.jwt.expiration=3600

# RabbitMQ desativado em testes
quarkus.rabbitmq.devservices.enabled=false

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.app".level=DEBUG
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] %s%e%n
