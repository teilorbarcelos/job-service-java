name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespw
          POSTGRES_DB: backend_java
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Lint (formatter)
        run: ./mvnw -B -ntp formatter:validate

      - name: Run tests with coverage
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/backend_java
          MESSAGING_ENABLED: "false"
        run: |
          ./mvnw -B -ntp test \
            -Djacoco.excludes=**/Application.class

      - name: Check coverage gate (≥85% line, excluding Application.java)
        run: |
          python3 - <<'PY'
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          root = tree.getroot()
          total_covered = total_missed = 0
          for pkg in root.findall('package'):
            for cls in pkg.findall('class'):
              name = cls.get('name', '')
              if 'Application' in name.split('/')[-1]:
                continue
              for counter in cls.findall('counter'):
                if counter.get('type') == 'LINE':
                  total_covered += int(counter.get('covered', 0))
                  total_missed += int(counter.get('missed', 0))
          total = total_covered + total_missed
          if total == 0:
            raise SystemExit("No coverage data found")
          rate = total_covered / total
          if rate < 0.85:
            raise SystemExit(f"Coverage below 85% — {rate*100:.1f}%")
          print(f"✅ Coverage gate passed: {rate*100:.1f}% ({total_covered}/{total} lines)")
          PY
