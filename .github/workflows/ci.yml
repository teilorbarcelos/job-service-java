name: Java CI with Maven

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # Although we use H2 for unit tests, some integration tests might eventually 
      # benefit from having the real infra available if needed.
      # For now, we keep it simple as per implementation plan.
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: backend_db
          POSTGRES_PASSWORD: postgrespw
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B verify

    - name: Upload JaCoCo coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/jacoco-report/
